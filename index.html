<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Round of 32</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0c0e14; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .match-card { background: #1a1c24; border-radius: 12px; padding: 16px 20px; border: 1px solid #2a2f3a; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .vs-badge { font-size: 0.7rem; font-weight: 900; color: #0c0e14; background-color: #d4ff00; padding: 4px 10px; border-radius: 6px; box-shadow: 0 0 10px rgba(212, 255, 0, 0.4); letter-spacing: 0.05em; }
        .team-link { font-size: 0.9rem; font-weight: 600; color: #f1f5f9; text-decoration: none; transition: 0.3s; }
        .team-link:hover { color: #d4ff00; }
        .no-link { font-size: 0.9rem; font-weight: 600; color: #f1f5f9; }
        #trophy-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: linear-gradient(135deg, #d4ff00, #a3c400); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(212, 255, 0, 0.4); z-index: 9999; font-size: 24px; }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-md mx-auto">
        <h1 class="text-lg font-bold text-white tracking-widest uppercase mb-8 text-center">ROUND OF 32 (Group-Based)</h1>
        <div id="tournament-content" class="space-y-3"></div>
    </div>
    <a href="https://shelbyzio.github.io/MasterLeague_Fixtures/" id="trophy-btn">🏆</a>

    <script>
        const GROUPS = {
            A: ["Austria", "Australia", "Brazil", "Cape Verde"],
            B: ["Colombia", "Croatia", "DR Congo", "England"],
            C: ["Germany", "France", "Japan", "Jordan"],
            D: ["New Zealand", "Mexico", "Portugal", "Norway"],
            E: ["Scotland", "Qatar", "Spain", "South Africa"],
            F: ["United States", "Tunisia", "Uruguay", "Algeria"],
            G: ["South Korea", "Panama", "Turkey", "Senegal"],
            H: ["Netherlands", "Iran", "Ecuador", "Czechia"]
        };

        const CONTACTS = {
            "Austria": "https://t.me/lord_voldemort101", "Australia": "https://t.me/KhantX_7272",
            "Brazil": "https://t.me/ggman53343", "Cape Verde": "https://t.me/trt109829",
            "Colombia": "https://t.me/iz_szlai", "Croatia": "https://t.me/Saad_waiyan",
            "DR Congo": "https://t.me/LuNyo0", "England": "https://t.me/goddeden",
            "Germany": "https://t.me/MESSi_10FC", "France": "https://t.me/Hemaljr10",
            "Japan": "https://t.me/LHA_goodluck", "Jordan": "https://t.me/NaingHtun1",
            "New Zealand": "https://t.me/ikc8088", "Mexico": "https://t.me/Ordinary_1211",
            "Portugal": "https://t.me/Pyaephyowin250832229", "Norway": "https://t.me/z09khun",
            "Scotland": "https://t.me/kokyaw876", "Qatar": "https://t.me/iluv_Nadi",
            "Spain": "https://t.me/KyawGyi798260", "South Africa": "https://t.me/zingyia",
            "United States": "https://t.me/ChanAung1178", "Tunisia": "https://t.me/Myo3135",
            "Uruguay": "https://t.me/Rashford01112009", "Algeria": "https://t.me/kaunghtetko354",
            "South Korea": "https://t.me/Kaylarr1", "Panama": "",
            "Turkey": "https://t.me/Phyu1724", "Senegal": "https://t.me/yinaung11",
            "Netherlands": "https://t.me/AHira99", "Iran": "https://t.me/Thuya12345678901",
            "Ecuador": "https://t.me/ZinMinKhant2007", "Czechia": "https://t.me/Mgzay8"
        };

        // Group တွေကို အပိုင်း ၂ ပိုင်းခွဲလိုက်သည် (၁-၂ နှင့် ၃-၄)
        let pot1 = []; // Group တစ်ခုစီရဲ့ (၁, ၂) အသင်းများ
        let pot2 = []; // Group တစ်ခုစီရဲ့ (၃, ၄) အသင်းများ

        Object.values(GROUPS).forEach(group => {
            pot1.push(group[0], group[1]);
            pot2.push(group[2], group[3]);
        });

        // ၃-၄ အသင်းများကို Shuffle လုပ်ပေးခြင်းဖြင့် ပိုမိုမျှတစေရန်
        pot2.sort(() => Math.random() - 0.5);

        const container = document.getElementById('tournament-content');
        
        // pot1 အသင်းတွေနဲ့ pot2 အသင်းတွေကို တွဲပေးလိုက်သည် (၁-၂ vs ၃-၄ မဖြစ်စေရ)
        pot1.forEach((team1, index) => {
            const team2 = pot2[index];
            const matchCard = document.createElement('div');
            matchCard.className = 'match-card';
            
            const createLink = (name) => CONTACTS[name] ? `<a href="${CONTACTS[name]}" target="_blank" class="team-link">${name}</a>` : `<span class="no-link">${name}</span>`;
            
            matchCard.innerHTML = `
                <div class="flex-1 text-left truncate pr-2">${createLink(team1)}</div>
                <div class="vs-badge">VS</div>
                <div class="flex-1 text-right truncate pl-2">${createLink(team2)}</div>
            `;
            container.appendChild(matchCard);
        });
    </script>
</body>
</html>
